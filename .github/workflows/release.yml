name: Release Okaso

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permission:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          mvn install -DskipTests \
            --batch-mode

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Okaso ${{ github.ref_name }}
          body: |
            ## Okaso ${{ github.ref_name }}

            Download the adapter for your platform:

            | File | Platform |
            |------|----------|
            | `okaso-bukkit-*.jar` | Bukkit / Spigot / Paper |
            | `okaso-bungeecord-*.jar` | BungeeCord |
            | `okaso-waterfall-*.jar` | Waterfall |
            | `okaso-velocity-*.jar` | Velocity |
          files: |
            okaso-bukkit/target/*.jar
            okaso-bungeecord/target/*.jar
            okaso-waterfall/target/*.jar
            okaso-velocity/target/*.jar
          fail-on-unmatched-files: true
