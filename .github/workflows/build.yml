name: Build Okaso Adapters

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip tests during build'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          mvn install -DskipTests=${{ github.event.inputs.skip-tests || 'true' }} \
            --batch-mode

      - name: Upload Okaso Bukkit JAR
        uses: actions/upload-artifact@v4
        with:
          name: okaso-bukkit
          path: okaso-bukkit/target/*.jar
          if-no-files-found: error

      - name: Upload Okaso BungeeCord JAR
        uses: actions/upload-artifact@v4
        with:
          name: okaso-bungeecord
          path: okaso-bungeecord/target/*.jar
          if-no-files-found: error

      - name: Upload Okaso Waterfall JAR
        uses: actions/upload-artifact@v4
        with:
          name: okaso-waterfall
          path: okaso-waterfall/target/*.jar
          if-no-files-found: error

      - name: Upload Okaso Velocity JAR
        uses: actions/upload-artifact@v4
        with:
          name: okaso-velocity
          path: okaso-velocity/target/*.jar
          if-no-files-found: error
